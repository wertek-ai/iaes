<script type="text/javascript">
  RED.nodes.registerType("iaes-validate", {
    category: "IAES",
    color: "#16a34a",
    defaults: {
      name: { value: "" },
    },
    inputs: 1,
    outputs: 2,
    outputLabels: ["valid", "invalid"],
    icon: "font-awesome/fa-check-circle",
    label: function () {
      return this.name || "iaes validate";
    },
    paletteLabel: "iaes validate",
  });
</script>

<script type="text/html" data-template-name="iaes-validate">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
</script>

<script type="text/html" data-help-name="iaes-validate">
  <p>Validates an IAES event envelope.</p>
  <h3>Input</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object | string</span></dt>
    <dd>An IAES event envelope (object or JSON string).</dd>
  </dl>
  <h3>Outputs</h3>
  <ol class="node-ports">
    <li>Valid
      <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>The validated IAES envelope.</dd>
        <dt>iaes_event_type <span class="property-type">string</span></dt>
        <dd>The event type (e.g., <code>asset.measurement</code>).</dd>
        <dt>iaes_asset_id <span class="property-type">string</span></dt>
        <dd>The asset ID from the event.</dd>
      </dl>
    </li>
    <li>Invalid
      <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>The original payload.</dd>
        <dt>iaes_error <span class="property-type">string</span></dt>
        <dd>Description of the validation error.</dd>
      </dl>
    </li>
  </ol>
  <h3>Details</h3>
  <p>Routes valid IAES events to output 1 and invalid events to output 2.
  Checks for required fields (event_type, asset.asset_id, data) and verifies
  the event_type is a recognized IAES type.</p>
  <p>Use this node to filter and validate incoming MQTT or HTTP messages
  before processing them in your flow.</p>
</script>
